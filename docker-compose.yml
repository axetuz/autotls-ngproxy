# =============================================================================
# .env переменные:
#   DOMAIN          - доменное имя*
#   PROXY_PASS      - адрес upstream*
#   CERTBOT_IMAGE   - образ certbot (по умолч.: certbot/certbot)
#                     certbot/dns-cloudflare | certbot/dns-route53
#                     certbot/dns-digitalocean | certbot/dns-google
#                     certbot/dns-hetzner | certbot/dns-ovh | ...
# =============================================================================

services:

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - PROXY_PASS=${PROXY_PASS}
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./certbot/conf:/etc/letsencrypt
    entrypoint:
      - /bin/sh
      - -c
      - |
        rm -f /etc/nginx/conf.d/default.conf
        /docker-entrypoint.sh nginx -g 'daemon off;' &
        while :; do sleep 6h & wait $${!}; nginx -s reload; done
    depends_on:
      - certbot

  certbot:
    image: ${CERTBOT_IMAGE:-certbot/certbot}
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/secrets:/secrets:ro
    entrypoint: >-
      /bin/sh -c
      'trap exit TERM;
       while :; do
         certbot renew --quiet;
         sleep 12h & wait $${!};
       done'