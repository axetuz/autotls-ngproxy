# =============================================================================
# .env переменные:
#   DOMAIN          - доменное имя*
#   PROXY_PASS      - адрес upstream*
#   CF_Token        - Cloudflare API Token (для DNS-01 через acme.sh)
#   CF_Account_ID   - Cloudflare Account ID (опционально, для некоторых токенов)
# =============================================================================

services:

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - PROXY_PASS=${PROXY_PASS}
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./certs:/etc/letsencrypt:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        rm -f /etc/nginx/conf.d/default.conf
        /docker-entrypoint.sh nginx -g 'daemon off;' &
        while :; do sleep 6h & wait $${!}; nginx -s reload; done
    depends_on:
      - acme

  acme:
    image: neilpang/acme.sh
    restart: unless-stopped
    environment:
      - CF_Token=${CF_Token}
      - CF_Account_ID=${CF_Account_ID}
      - DOMAIN=${DOMAIN}
    volumes:
      - ./acme/data:/acme.sh
      - ./certs:/certs
    entrypoint: >-
      /bin/sh -c
      'trap exit TERM;
       while :; do
         acme.sh --cron --home /acme.sh
         && acme.sh --install-cert -d "$$DOMAIN"
              --home /acme.sh
              --fullchain-file /certs/live/$$DOMAIN/fullchain.pem
              --key-file /certs/live/$$DOMAIN/privkey.pem;
         sleep 12h & wait $${!};
       done'
